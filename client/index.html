<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC — Sala de Vídeo</title>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <!-- Tela de entrada -->
  <div id="lobby">
    <div class="lobby-card">
      <h1>WebRTC — Sala de Vídeo</h1>
      <p class="lobby-subtitle">Até 5 participantes por sala</p>
      <div class="lobby-form">
        <input type="text" id="roomId" placeholder="ID da sala (ex: sala123)" autocomplete="off">
        <button id="joinBtn">Entrar na Sala</button>
      </div>
      <p class="lobby-id">Seu ID: <strong id="myId">Conectando...</strong></p>
      <div id="lobbyStatus"></div>
    </div>
  </div>

  <!-- Sala de vídeo -->
  <div id="room" class="hidden">
    <div id="videosGrid"></div>

    <div class="room-bar">
      <span id="roomLabel" class="room-name"></span>
      <div class="room-controls">
        <button id="muteBtn" class="ctrl-btn" title="Microfone">🎤</button>
        <button id="videoBtn" class="ctrl-btn" title="Câmera">📹</button>
        <button id="recordBtn" class="ctrl-btn" title="Gravar">⏺️</button>
        <button id="hangupBtn" class="ctrl-btn danger" title="Sair">📞</button>
      </div>
      <div id="status"></div>
    </div>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
